<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Emotia</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: { "primary": "#0d968b" },
        fontFamily: { "display": ["Inter", "sans-serif"] },
      },
    },
  }
</script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #F5F0E8;
    min-height: 100dvh;
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24;
  }
</style>
</head>
<body>
<div class="flex flex-col min-h-screen w-full px-7 pt-16 pb-12">

  <!-- Logo / marca -->
  <div class="flex items-center gap-2 mb-auto">
    <div class="w-8 h-8 rounded-xl bg-[#0d968b] flex items-center justify-center">
      <span class="material-symbols-outlined text-white text-base">favorite</span>
    </div>
    <span class="text-[#0d968b] font-extrabold text-lg tracking-tight">Emotia</span>
  </div>

  <!-- Ilustración central -->
  <div class="flex flex-col items-center justify-center flex-1 py-10">
    <!-- Círculos concéntricos decorativos -->
    <div class="relative flex items-center justify-center">
      <div class="absolute w-64 h-64 rounded-full bg-[#0d968b]/6"></div>
      <div class="absolute w-48 h-48 rounded-full bg-[#0d968b]/10"></div>
      <div class="absolute w-32 h-32 rounded-full bg-[#0d968b]/16"></div>
      <!-- Icono central -->
      <div class="relative w-24 h-24 rounded-3xl bg-[#0d968b] flex items-center justify-center shadow-2xl shadow-[#0d968b]/30">
        <span class="material-symbols-outlined text-white" style="font-size:2.75rem">favorite</span>
      </div>
      <!-- Iconos flotantes -->
      <div class="absolute -top-2 right-10 w-10 h-10 rounded-2xl bg-white shadow-md flex items-center justify-center">
        <span class="material-symbols-outlined text-[#0d968b] text-xl">sentiment_satisfied</span>
      </div>
      <div class="absolute bottom-4 -left-4 w-10 h-10 rounded-2xl bg-white shadow-md flex items-center justify-center">
        <span class="material-symbols-outlined text-[#0d968b] text-xl">local_fire_department</span>
      </div>
      <div class="absolute top-8 -left-6 w-8 h-8 rounded-xl bg-white shadow-md flex items-center justify-center">
        <span class="material-symbols-outlined text-[#0d968b] text-base">auto_awesome</span>
      </div>
    </div>
  </div>

  <!-- Texto principal -->
  <div class="mb-10">
    <h1 class="text-slate-900 font-extrabold text-[2.6rem] leading-[1.08] tracking-tight mb-3">
      Conecta<br/>de verdad.
    </h1>
    <p class="text-slate-500 text-base font-normal leading-relaxed max-w-[260px]">
      Tu espacio íntimo para cuidar lo que más importa.
    </p>
  </div>

  <!-- Acciones -->
  <div class="flex flex-col gap-3">
    <button id="start-btn" class="bg-[#0d968b] text-white text-base font-semibold py-4 px-6 rounded-2xl shadow-lg shadow-[#0d968b]/25 active:scale-[0.97] transition-transform flex items-center justify-between">
      <span>Empezar</span>
      <span class="material-symbols-outlined text-xl" style="font-variation-settings:'FILL' 0,'wght' 300">arrow_forward</span>
    </button>
    <button id="login-btn" class="text-slate-400 text-sm font-medium py-3 text-center active:opacity-60 transition-opacity">
      Ya tengo una cuenta
    </button>
  </div>

</div>
</body></html>
