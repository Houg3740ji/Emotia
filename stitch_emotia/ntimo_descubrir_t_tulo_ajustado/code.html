<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d968b",
                        "navy-custom": "#0A192F",
                        "background-light": "#F5F0E8",
                        "background-dark": "#102220",
                        "card-beige": "#FFFFFF",
                        "discard-red": "#FF4B4B",
                        "match-green": "#2DCE89",
                        "nav-teal": "#0D9488"
                    },
                    fontFamily: {
                        "display": ["-apple-system", "BlinkMacSystemFont", "system-ui", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); }
        .nav-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1); }
        body {
            min-height: 100dvh;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="pt-12 pb-2 px-6 flex items-center justify-center bg-background-light/80 backdrop-blur-md sticky top-0 z-50">
<h1 class="font-bold tracking-tight text-slate-900 text-4xl">Íntimo</h1>
</header>
<div class="px-6 py-4">
<div class="flex h-11 items-center justify-center rounded-xl bg-slate-200/50 p-1 max-w-sm mx-auto">
<label class="flex cursor-pointer h-full grow items-center justify-center rounded-lg px-2 has-[:checked]:bg-white has-[:checked]:shadow-sm text-slate-500 has-[:checked]:text-primary transition-all duration-200">
<span class="text-sm font-semibold">Descubrir</span>
<input checked="" class="hidden" name="tabs" type="radio" value="descubrir"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center rounded-lg px-2 has-[:checked]:bg-white has-[:checked]:shadow-sm text-slate-500 has-[:checked]:text-primary transition-all duration-200">
<span class="text-sm font-semibold">Matches</span>
<input class="hidden" name="tabs" type="radio" value="matches"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center rounded-lg px-2 has-[:checked]:bg-white has-[:checked]:shadow-sm text-slate-500 has-[:checked]:text-primary transition-all duration-200">
<span class="text-sm font-semibold">Historial</span>
<input class="hidden" name="tabs" type="radio" value="historial"/>
</label>
</div>
</div>
<main class="flex-1 flex flex-col items-center justify-center px-6 pb-36 overflow-hidden relative">
<div class="relative w-full max-w-sm aspect-[3/4] group">
<div class="absolute inset-0 bg-white/40 rounded-3xl translate-y-4 scale-95 -z-10 shadow-sm border border-slate-200/50"></div>
<div class="w-full h-full bg-white rounded-3xl overflow-hidden card-shadow flex flex-col border border-slate-100">
<div class="relative flex-1 bg-slate-50 overflow-hidden">
<img alt="Minimalist botanical line art illustration" class="w-full h-full object-cover mix-blend-multiply opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBryZBpQfD_xpC_5mEAOxlllXONyfZyQDjEZil3ZFM3RZPWydSikKAHVeP5MNbnQ_0jzvjS_7ItlfKIoomGtKN1QdN4KRObn1STjlDsz1LtdPl6jTOLfV0jUYwKzYcsCHSAIjQY_-6RYas6icfQ1rlrF6jRXHWrQ88Jljp_feN59N4qFX-QuXodkMMYNvQLTb0rco7jI0d0P5aQAj6YugQn2ovMpudzewy0CuzbtcQAnXVuL0YhxeIDKf-n4ovok2d0orWS3n1n43U"/>
<div class="absolute inset-0 bg-gradient-to-t from-white via-transparent to-transparent"></div>
<div class="absolute bottom-6 left-6 right-6">
<div class="inline-flex items-center px-3 py-1 rounded-full bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-wider mb-2">
                            Técnica Milenaria
                        </div>
<h2 class="text-3xl font-bold text-slate-900 leading-tight">El Loto de Jade</h2>
</div>
</div>
<div class="p-6 pt-2">
<p class="text-slate-600 text-base leading-relaxed">
                        Una postura de profunda conexión espiritual y física. Ideal para momentos de intimidad pausada y contacto visual directo, fomentando la sincronía respiratoria.
                    </p>
<div class="mt-6 flex items-center gap-4">
<div class="flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 rounded-full">
<span class="material-symbols-outlined text-sm text-slate-500">timer</span>
<span class="text-xs font-medium text-slate-600">15-20 min</span>
</div>
<div class="flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 rounded-full">
<span class="material-symbols-outlined text-sm text-slate-500">bolt</span>
<span class="text-xs font-medium text-slate-600">Suave</span>
</div>
</div>
</div>
</div>
</div>
<div class="flex items-center gap-8 mt-10">
<button class="w-16 h-16 rounded-full bg-white shadow-lg border border-slate-100 flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined text-discard-red text-4xl font-bold">close</span>
</button>
<button class="w-12 h-12 rounded-full bg-white shadow-md border border-slate-100 flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined text-slate-400 text-2xl">info</span>
</button>
<button class="w-16 h-16 rounded-full bg-white shadow-lg border border-slate-100 flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined text-match-green text-4xl font-bold">check</span>
</button>
</div>
</main>

</body></html>
