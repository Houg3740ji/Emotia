<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"/></head>
<body class="bg-[#F5F0E8] font-display text-slate-900 pb-32">

<header class="sticky top-0 z-10 bg-[#F5F0E8]/90 backdrop-blur-md px-5 pt-10 pb-4 flex items-center gap-3 border-b border-slate-200/50">
  <button class="size-9 rounded-full bg-white flex items-center justify-center shadow-sm active:scale-95 transition-transform">
    <span class="material-symbols-outlined text-xl text-slate-600">arrow_back_ios_new</span>
  </button>
  <div>
    <h1 class="text-xl font-bold tracking-tight" data-i18n="notes.title">Historial de Reflexiones</h1>
    <p class="text-xs text-slate-400" id="notas-subtitle" data-i18n="notes.defaultSubtitle">Últimos 30 días</p>
  </div>
</header>

<main class="px-4 pt-5 flex flex-col gap-4" id="notas-list">
  <!-- Esqueleto de carga -->
  <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 animate-pulse">
    <div class="h-3 bg-slate-100 rounded w-24 mb-3"></div>
    <div class="h-4 bg-slate-100 rounded w-full mb-4"></div>
    <div class="h-10 bg-slate-50 rounded-xl"></div>
  </div>
  <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 animate-pulse">
    <div class="h-3 bg-slate-100 rounded w-24 mb-3"></div>
    <div class="h-4 bg-slate-100 rounded w-3/4 mb-4"></div>
    <div class="h-10 bg-slate-50 rounded-xl"></div>
  </div>
  <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 animate-pulse">
    <div class="h-3 bg-slate-100 rounded w-20 mb-3"></div>
    <div class="h-4 bg-slate-100 rounded w-full mb-4"></div>
    <div class="h-10 bg-slate-50 rounded-xl"></div>
  </div>
</main>

</body>
</html>
