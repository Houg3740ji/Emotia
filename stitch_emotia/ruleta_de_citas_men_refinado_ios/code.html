<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d968b",
                        "background-light": "#F5F0E8",
                        "background-dark": "#102220",
                        "accent-warm": "#E8DED1",
                    },
                    fontFamily: {
                        "display": ["-apple-system", "BlinkMacSystemFont", "system-ui", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        .wheel-shadow {
            box-shadow: 0 10px 25px -5px rgba(13, 150, 139, 0.2), 0 8px 10px -6px rgba(13, 150, 139, 0.2);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body {
            min-height: max(884px, 100dvh);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .nav-shadow {
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-4 flex flex-col items-center justify-center border-b border-primary/5">
<h1 class="font-bold tracking-tight text-2xl">Ruleta de citas</h1>
<p class="text-xs text-slate-500 uppercase tracking-widest font-semibold mt-1">Crea tu cita perfecta</p>
</header>
<main class="flex-1 overflow-y-auto pb-28">
<section class="px-4 py-6">
<div class="flex items-center gap-2 mb-6">
<span class="bg-primary text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">1</span>
<h2 class="font-bold text-lg">Selecciona el estilo</h2>
</div>
<div class="space-y-6">
<div>
<h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">DURACIÓN</h3>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2.5 rounded-full bg-[#0D9488] text-white text-sm font-bold shadow-sm">Express (&lt;1h)</button>
<button class="px-5 py-2.5 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 text-sm font-medium">Estándar (2-3h)</button>
<button class="px-5 py-2.5 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 text-sm font-medium">Larga duración</button>
</div>
</div>
<div>
<h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">COSTO</h3>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2.5 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 text-sm font-medium">Gratis</button>
<button class="px-5 py-2.5 rounded-full bg-[#0D9488] text-white text-sm font-bold shadow-sm">Económico</button>
<button class="px-5 py-2.5 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 text-sm font-medium">Premium</button>
</div>
</div>
<div>
<h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">ESTADO DE ÁNIMO</h3>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2.5 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 text-sm font-medium">Relajado</button>
<button class="px-5 py-2.5 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 text-sm font-medium">Energético</button>
<button class="px-5 py-2.5 rounded-full bg-[#0D9488] text-white text-sm font-bold shadow-sm">Romántico</button>
</div>
</div>
</div>
</section>
<section class="px-4 py-8 bg-accent-warm/30 dark:bg-slate-900/50">
<div class="flex items-center gap-2 mb-8">
<span class="bg-primary text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">2</span>
<h2 class="font-bold text-lg">Descubre tu cita</h2>
</div>
<div class="flex flex-col items-center justify-center relative">
<div class="relative w-64 h-64 md:w-80 md:h-80 rounded-full bg-white dark:bg-slate-800 wheel-shadow border-8 border-primary/10 flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 opacity-10">
<div class="absolute inset-0 rotate-0 border-r-2 border-primary"></div>
<div class="absolute inset-0 rotate-45 border-r-2 border-primary"></div>
<div class="absolute inset-0 rotate-90 border-r-2 border-primary"></div>
<div class="absolute inset-0 rotate-135 border-r-2 border-primary"></div>
</div>
<div class="flex flex-col items-center gap-1 z-10 text-center px-6">
<p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Sugerencia actual</p>
<div class="flex flex-col gap-1">
<p class="text-slate-300 text-xs font-medium line-through opacity-50">Cena a la luz de las velas</p>
<p class="text-primary text-base font-bold bg-primary/10 px-4 py-2 rounded-lg">Paseo por el parque</p>
<p class="text-slate-300 text-xs font-medium line-through opacity-50">Cine de verano</p>
</div>
</div>
<div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-8 h-8 bg-primary rotate-45 rounded-sm"></div>
</div>
<button class="mt-10 flex min-w-[200px] cursor-pointer items-center justify-center rounded-xl h-14 px-8 bg-primary text-white text-lg font-bold shadow-lg hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined mr-2">refresh</span>
                    GIRAR
                </button>
</div>
</section>
</main>

</body></html>
