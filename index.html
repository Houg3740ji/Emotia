<!DOCTYPE html>
<html lang="es" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Emotia</title>

  <!-- Tailwind CDN — único punto de carga para toda la SPA -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <!-- ── Tailwind config unificado (consolida los de TODAS las pantallas Stitch) ── -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary":          "#0d968b",
            "background-light": "#F5F0E8",
            "background-dark":  "#102220",
            "navy-custom":      "#1E293B",
            "navy":             "#1E2B3C",
            "widget-bg":        "#FFFFFF",
            "card-cream":       "#FFFFFF",
            "soft-teal":        "#E0F2F1",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"],
            "sans":    ["Inter", "sans-serif"],
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg":      "1rem",
            "xl":      "1.5rem",
            "2xl":     "2rem",
            "3xl":     "3rem",
            "full":    "9999px",
          },
        },
      },
    };
  </script>

  <!-- ── Estilos consolidados de todas las pantallas Stitch ── -->
  <style type="text/tailwindcss">
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

    /* Material Symbols */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .fill-icon { font-variation-settings: 'FILL' 1, 'wght' 300; }

    /* Grid del Home */
    .command-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-auto-rows: auto; gap: 0.75rem; }
    .widget-span-2 { grid-column: span 2; }

    /* Sombras iOS */
    .ios-shadow      { box-shadow: 0 4px 20px -2px rgba(0,0,0,0.04); }
    .very-soft-shadow{ box-shadow: 0 2px 12px rgba(0,0,0,0.03); }

    /* Emoji grid del check-in */
    .emoji-grid-item { transition: transform 0.15s ease-in-out; cursor: pointer; }
    .emoji-grid-item:active { transform: scale(0.88); }
    .emoji-selected  { @apply border-primary bg-primary/5 scale-105; }

    /* Safe area para el botón de iOS */
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 24px); }

    /* Onboarding hero image clip */
    .hero-clip { clip-path: ellipse(120% 100% at 50% 0%); }

    /* Fuente emoji para Apple */
    .apple-emoji { font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif; }

    /* Input gigante del onboarding (usa @apply) */
    .text-input-giant {
      @apply text-[56px] sm:text-[64px] font-extrabold leading-none tracking-tight text-slate-900 placeholder:text-slate-200 bg-transparent border-none p-0 w-full;
    }

    /* Scrollbar invisible */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Transición al cambiar pantalla */
    @keyframes screenFadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .screen-enter { animation: screenFadeIn 0.2s ease-out; }

    /* Mensajes de error bajo inputs */
    .field-error { @apply text-red-500 text-xs mt-1.5 px-1; }

    /* Respuesta de pareja borrosa (blur-to-reveal) */
    .partner-answer-locked { filter: blur(8px); user-select: none; pointer-events: none; }

    /* Botón deshabilitado genérico */
    button:disabled { @apply opacity-50 cursor-not-allowed; }

    /* Toast */
    #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); z-index: 9000; pointer-events: none; }
    .toast-pill { @apply bg-slate-900 text-white text-sm font-medium px-5 py-3 rounded-full shadow-xl; white-space: nowrap; }
  </style>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { min-height: 100dvh; }
    #app  { min-height: 100dvh; width: 100%; }

    /* Pantalla de carga */
    #loading-overlay {
      position: fixed; inset: 0;
      background: #F5F0E8;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #loading-overlay.fade-out { opacity: 0; pointer-events: none; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 3px solid #e0f2f1; border-top-color: #0d968b;
      border-radius: 50%; animation: spin 0.75s linear infinite;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <!-- Pantalla de carga mientras se verifica sesión -->
  <div id="loading-overlay">
    <span style="font-size:2rem;font-weight:900;color:#0d968b;letter-spacing:-0.05em">Emotia</span>
    <div class="loading-spinner"></div>
  </div>

  <!-- Sistema de toasts -->
  <div id="toast" style="display:none;"></div>

  <!-- Contenedor principal — el router inyecta las pantallas aquí -->
  <div id="app"></div>

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
